<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>тЙ«ућхуйЉТІЊТЅЉ Рђћ У«ЙУ«АтјЪтъІ v2</title>
<style>
  :root {
    --bg: #f8f9fb; --surface: #fff; --border: #e4e7ed;
    --text: #303133; --text2: #909399;
    --pv: #67c23a; --bat: #409eff; --load: #e6a23c; --charger: #909399;
    --off: #c0c4cc; --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #eef1f6; color: #303133; min-height: 100vh;
    display: flex; justify-content: center; align-items: flex-start; padding: 24px;
  }
  .panel { background:#fff; border:1px solid #e4e7ed; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,.08); max-width:920px; width:100%; overflow:hidden }
  .panel-head { display:flex; justify-content:space-between; align-items:center; padding:14px 20px; border-bottom:1px solid #e4e7ed; background:#fafbfc }
  .panel-head h2 { font-size:15px; font-weight:700; display:flex; align-items:center; gap:8px }
  .live-dot { width:8px; height:8px; border-radius:50%; background:#67c23a; animation:pulse 2s infinite }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .controls { display:flex; gap:8px; align-items:center }
  .legend { display:flex; gap:14px; font-size:11px; color:#909399 }
  .legend i { display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:3px; vertical-align:middle }
  .btn-group { display:flex; border:1px solid #e4e7ed; border-radius:6px; overflow:hidden }
  .btn-group button { background:#fff; border:none; border-right:1px solid #e4e7ed; color:#303133; font-size:14px; font-weight:600; width:34px; height:30px; cursor:pointer; transition:background .15s }
  .btn-group button:hover { background:#67c23a; color:#fff }
  .btn-group button:last-child { border-right:none }

  .canvas-wrap { overflow:auto; max-height:600px; background:linear-gradient(180deg,#fafbfc,#f0f2f5) }
  .canvas-transform { transform-origin:0 0; transition:transform .15s ease-out; min-width:680px }

  /* РћђРћђ Flow animation: flowing dashes on lines РћђРћђ */
  @keyframes flow-fwd { to { stroke-dashoffset: -24; } }
  @keyframes flow-rev { to { stroke-dashoffset: 24; } }
  .flow-dn { stroke-dasharray:8 8; animation:flow-fwd .7s linear infinite }
  .flow-up { stroke-dasharray:8 8; animation:flow-rev .7s linear infinite }
  .flow-z  { stroke-dasharray:4 8; stroke:#c0c4cc }

  .status-bar { padding:10px 20px; border-top:1px solid #e4e7ed; background:#fafbfc; display:flex; justify-content:space-between; font-size:12px; color:#909399 }
  .status-bar strong { color:#303133 }
</style>
</head>
<body>
<div class="panel">
  <div class="panel-head">
    <h2><span class="live-dot"></span>тЙ«ућхуйЉТІЊТЅЉ Рђћ 10kV Т»Їу║┐</h2>
    <div class="controls">
      <div class="legend">
        <span><i style="background:#67c23a"></i>тЈЉућх</span>
        <span><i style="background:#e6a23c"></i>ућеућх</span>
        <span><i style="background:#409eff"></i>тѓеУЃй</span>
        <span><i style="background:#c0c4cc"></i>ТќГт╝ђ</span>
      </div>
      <div class="btn-group">
        <button onclick="zoomIn()">+</button>
        <button onclick="zoomReset()" style="font-size:12px;width:40px">1:1</button>
        <button onclick="zoomOut()">Рѕњ</button>
      </div>
    </div>
  </div>
  <div class="canvas-wrap" id="wrap">
    <div class="canvas-transform" id="transform">
      <svg id="svg"></svg>
    </div>
  </div>
  <div class="status-bar" id="bar">
    <span>У«ЙтцЄТЋ░: <strong id="sc">0</strong></span>
    <span>тЈЉућх: <strong id="sg">--</strong></span>
    <span>ућеућх: <strong id="sl" style="color:#e6a23c">--</strong></span>
    <span>тЁ│тЈБтіЪујЄ: <strong id="sgr">--</strong></span>
    <span>жбЉујЄ: <strong id="sf">50.00 Hz</strong></span>
  </div>
</div>
<script>
var scale=1
var devices=[
  {id:'pv1',name:'тЁЅС╝ЈжўхтѕЌA',type:'pv',sw:{name:'QF1',closed:true},p:48.5,rate:80},
  {id:'bat1',name:'ESS-1',type:'battery',sw:{name:'QF2',closed:true},p:-30,rate:200,soc:68},
  {id:'load1',name:'УйджЌ┤У┤ЪУЇи',type:'load',sw:{name:'QF3',closed:true},p:32,rate:60},
  {id:'charger1',name:'тЁЁућхТАЕ#1',type:'charger',sw:{name:'QF4',closed:true},p:15.5,rate:40},
  {id:'pv2',name:'тЁЅС╝ЈжўхтѕЌB',type:'pv',sw:{name:'QF5',closed:false},p:0,rate:50},
  {id:'load2',name:'тіътЁгТЦ╝',type:'load',sw:{name:'QF6',closed:true},p:18.2,rate:35}
]
var L={pv:'тЁЅС╝Ј',battery:'тѓеУЃй',load:'У┤ЪУЇи',charger:'тЁЁућхТАЕ'}
var F={pv:'#67c23a',battery:'#409eff',load:'#e6a23c',charger:'#909399'}

var ROW_H=126, BUS_Y=260, MIN_GAP=110

function render(){
  var N=devices.length
  var W=Math.max(680, N*(MIN_GAP+10)+40)
  var H=BUS_Y+N*ROW_H+60, cx=W/2, sp=W/N
  var sx=cx-(sp*(N-1))/2
  var svg=document.getElementById('svg')
  svg.setAttribute('viewBox','0 0 '+W+' '+H)
  svg.setAttribute('width',W); svg.setAttribute('height',H)

  var rows=''
  for(var i=0;i<N;i++){
    var d=devices[i], dx=sx+i*sp, cl=d.sw.closed, t=d.type
    var swT=BUS_Y+20, swY=BUS_Y+50, swR=12
    var boxT=BUS_Y+90, boxH=34
    var fc=!cl?'flow-z':(t==='pv'?'flow-up':(t==='battery'&&d.p<0)?'flow-up':'flow-dn')
    var lc=cl?F[t]:'#c0c4cc'

    rows+='<line x1="'+dx+'" y1="'+BUS_Y+'" x2="'+dx+'" y2="'+swT+'" stroke="'+(cl?lc:'#c0c4cc')+'" stroke-width="2.5" stroke-linecap="round" class="'+fc+'"/>'
    var sf=cl?(t==='pv'?'#e8f5e9':t==='battery'?'#e3f2fd':'#fff3e0'):'#fef0f0'
    rows+='<circle cx="'+dx+'" cy="'+swY+'" r="'+swR+'" fill="'+sf+'" stroke="'+(cl?'#67c23a':'#f56c6c')+'" stroke-width="2" style="cursor:pointer"/>'
    if(cl) rows+='<line x1="'+(dx-7)+'" y1="'+swY+'" x2="'+(dx+7)+'" y2="'+swY+'" stroke="#67c23a" stroke-width="2" stroke-linecap="round"/>'
    else   rows+='<line x1="'+(dx-6)+'" y1="'+(swY-6)+'" x2="'+(dx+6)+'" y2="'+(swY+6)+'" stroke="#f56c6c" stroke-width="2" stroke-linecap="round"/>'

    rows+='<line x1="'+dx+'" y1="'+(swY+swR)+'" x2="'+dx+'" y2="'+boxT+'" stroke="'+(cl?lc:'#c0c4cc')+'" stroke-width="2" stroke-linecap="round" class="'+fc+'"/>'
    rows+='<text x="'+dx+'" y="'+(swY+swR+14)+'" text-anchor="middle" font-size="9" fill="#909399">'+d.sw.name+'</text>'
    rows+='<rect x="'+(dx-46)+'" y="'+boxT+'" width="92" height="'+boxH+'" rx="6" fill="'+(cl?F[t]:'#e0e0e0')+'" stroke="'+lc+'" stroke-width="1.5" opacity="'+(cl?1:0.5)+'"/>'
    rows+='<text x="'+dx+'" y="'+(boxT+12)+'" text-anchor="middle" font-size="12" font-weight="700" fill="'+(cl?'#fff':'#999')+'">'+L[t]+'</text>'
    rows+='<text x="'+dx+'" y="'+(boxT+26)+'" text-anchor="middle" font-size="10" fill="'+(cl?'rgba(255,255,255,0.9)':'#999')+'">'+d.name+'</text>'

    if(cl){
      var v=d.p.toFixed(1)
      rows+='<rect x="'+(dx-40)+'" y="'+(boxT+boxH+4)+'" width="80" height="18" rx="4" fill="'+lc+'" opacity="0.1"/>'
      rows+='<text x="'+dx+'" y="'+(boxT+boxH+16)+'" text-anchor="middle" font-size="11" font-weight="700" font-family="SF Mono,Menlo,monospace" fill="'+lc+'">'+v+' kW</text>'
    }else{
      rows+='<text x="'+dx+'" y="'+(boxT+boxH+12)+'" text-anchor="middle" font-size="10" fill="#c0c4cc">ти▓ТќГт╝ђ</text>'
    }
  }

  function act(d){return d.sw.closed}
  var PV=devices.filter(function(d){return d.type==='pv'&&act(d)}).reduce(function(s,d){return s+d.p},0)
  var LD=devices.filter(function(d){return d.type==='load'&&act(d)}).reduce(function(s,d){return s+d.p},0)
  var CH=devices.filter(function(d){return d.type==='charger'&&act(d)}).reduce(function(s,d){return s+d.p},0)
  var BAT=devices.filter(function(d){return d.type==='battery'&&act(d)}).reduce(function(s,d){return s+d.p},0)
  var GRID=LD+CH+BAT-PV
  var gen=PV+(BAT<0?-BAT:0), freq=50-GRID/(Math.max(gen+LD+CH,1))*0.5
  var sgn=GRID>=0?'+':'', glab=GRID>=0?'С╗јућхуйЉућеућх':'тљЉућхуйЉжђЂућх'

  var sy=H-50, sw2=Math.min(W-40,800), sxx=(W-sw2)/2
  svg.innerHTML='<defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0L0 0 0 40" fill="none" stroke="#e8eaef" stroke-width="0.5"/></pattern></defs>'+
  '<rect x="0" y="0" width="'+W+'" height="'+H+'" fill="url(#g)" opacity="0.4"/>'+
  '<rect x="'+(cx-56)+'" y="12" width="112" height="42" rx="6" fill="#fef0f0" stroke="#f89898" stroke-width="1.5" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,.1))"/>'+
  '<text x="'+cx+'" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#e63946">РџА ућхуйЉ</text>'+
  '<text x="'+cx+'" y="44" text-anchor="middle" font-size="10" fill="#c0392b">10 kV</text>'+
  '<line x1="'+cx+'" y1="54" x2="'+cx+'" y2="78" stroke="#bbb" stroke-width="2"/>'+
  '<polygon points="'+(cx-5)+',74 '+cx+',84 '+(cx+5)+',74" fill="#bbb"/>'+
  '<rect x="'+(cx-56)+'" y="84" width="112" height="42" rx="6" fill="#fef7e0" stroke="#e8c560" stroke-width="1.5" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,.1))"/>'+
  '<text x="'+cx+'" y="102" text-anchor="middle" font-size="14" font-weight="700" fill="#b8860b">­Ъћї тЁ│тЈБУАе</text>'+
  '<text x="'+cx+'" y="118" text-anchor="middle" font-size="10" fill="#8b6914">500 kW</text>'+
  '<line x1="'+cx+'" y1="126" x2="'+cx+'" y2="'+(BUS_Y-20)+'" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,4"/>'+
  '<polygon points="'+(cx-5)+','+(BUS_Y-24)+' '+cx+','+(BUS_Y-14)+' '+(cx+5)+','+(BUS_Y-24)+'" fill="#bbb"/>'+
  '<text x="'+(cx+20)+'" y="'+(BUS_Y-45)+'" font-size="13" font-weight="700" fill="#303133">10kV Т»Їу║┐</text>'+
  '<text x="'+(cx+20)+'" y="'+(BUS_Y-30)+'" font-size="11" fill="#909399">0.4 ~ 220 kV</text>'+
  '<line x1="'+(cx-240)+'" y1="'+BUS_Y+'" x2="'+(cx+240)+'" y2="'+BUS_Y+'" stroke="#555" stroke-width="3" stroke-linecap="round"/>'+
  rows+
  '<rect x="'+sxx+'" y="'+sy+'" width="'+sw2+'" height="36" rx="6" fill="#f0f4ff" stroke="#c6d6f0" stroke-width="1"/>'+
  '<text x="'+(W/2)+'" y="'+(sy+12)+'" text-anchor="middle" font-size="12" font-weight="600" fill="#303133">GRID = ('+LD.toFixed(1)+'+'+CH.toFixed(1)+'<tspan fill="#e6a23c">+'+BAT.toFixed(1)+'</tspan>) Рѕњ '+PV.toFixed(1)+' = <tspan fill="'+(GRID>=0?'#e6a23c':'#67c23a')+'" font-weight="700">'+sgn+GRID.toFixed(1)+' kW</tspan></text>'+
  '<text x="'+(W/2)+'" y="'+(sy+28)+'" text-anchor="middle" font-size="11" fill="#909399">жбЉујЄ '+freq.toFixed(2)+' Hz  ┬и  '+glab+'</text>'

  document.getElementById('sc').textContent=N
  document.getElementById('sg').textContent=PV.toFixed(1)+' kW'
  document.getElementById('sl').textContent=(LD+CH).toFixed(1)+' kW'
  var e=document.getElementById('sgr'); e.textContent=(GRID>=0?'+':'')+GRID.toFixed(1)+' kW'; e.style.color=GRID>=0?'#e6a23c':'#67c23a'
  document.getElementById('sf').textContent=freq.toFixed(2)+' Hz'
}

function appZ(){document.getElementById('transform').style.transform='scale('+scale+')'}
function zoomIn(){scale=Math.min(3,+(scale+.25).toFixed(2));appZ()}
function zoomOut(){scale=Math.max(.3,+(scale-.25).toFixed(2));appZ()}
function zoomReset(){scale=1;appZ()}
document.getElementById('wrap').addEventListener('wheel',function(e){if(!e.ctrlKey)return;e.preventDefault();e.deltaY<0?zoomIn():zoomOut()},{passive:false})

function sim(){
  devices.forEach(function(d){
    if(!d.sw.closed)return
    var j=(Math.random()-.5)*d.rate*.06
    d.p=Math.round((d.p+j)*10)/10
    if(d.type==='pv')d.p=Math.abs(d.p)
    if(d.type==='battery'){d.p=Math.max(-d.rate,Math.min(d.rate,d.p+j*2));d.soc=Math.max(0,Math.min(100,d.soc+(d.p>0?.08:-.08)))}
  })
  render()
}
render(); setInterval(sim,2000)
</script>
</body>
</html>
