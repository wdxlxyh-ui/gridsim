<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>10 种流动效方案</title>
<style>
:root{--bg:#1a1a2e;--fg:#e0e0e0;--accent:#00e676}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--fg);padding:24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:14px}
.card{background:#16213e;border:2px solid #0f3460;border-radius:10px;padding:18px;transition:border-color .2s;cursor:pointer}
.card:hover,.card.pick{border-color:#00e676}
.card h3{font-size:14px;margin-bottom:2px}
.card .dim{font-size:10px;color:#667788}
.card p{font-size:11px;color:#667788;margin:6px 0}
svg{display:block;background:#0a0f1a;border-radius:6px;margin-top:8px}

/* S1 */ @keyframes s1{to{stroke-dashoffset:-16}}.s1{stroke-dasharray:8 8;animation:s1 .8s linear infinite}
/* S2 */ @keyframes s2{to{stroke-dashoffset:-24}}.s2{stroke-dasharray:2 22;animation:s2 .4s linear infinite}
/* S3 */ @keyframes s3{to{stroke-dashoffset:-32}}.s3{stroke-dasharray:12 4;animation:s3 .6s linear infinite;stroke-width:3.5}
/* S4 */ @keyframes s4{to{stroke-dashoffset:-28}}.s4{stroke-dasharray:4 24;animation:s4 2s linear infinite}
/* S5 */ @keyframes s5{to{stroke-dashoffset:-24}}.s5{stroke-dasharray:2 6;animation:s5 .3s linear infinite;stroke-width:3}
/* S6 */ @keyframes s6{to{stroke-dashoffset:-20}}.s6{stroke-dasharray:2 2 12 4;animation:s6 1s linear infinite}
/* S7 */ @keyframes s7{to{stroke-dashoffset:-40}}.s7{stroke-dasharray:16 8;animation:s7 1.2s linear infinite;stroke-width:4}
/* S8 */ @keyframes s8{0%,100%{stroke-dashoffset:0;opacity:1}50%{stroke-dashoffset:-12;opacity:.2}}.s8{stroke-dasharray:6 6;animation:s8 1.5s ease-in-out infinite}
/* S9 */ @keyframes s9{to{stroke-dashoffset:-30}}.s9{stroke-dasharray:4 4 0 22;animation:s9 .5s linear infinite}
/* S10 */@keyframes s10{to{stroke-dashoffset:-48}}.s10{stroke-dasharray:24 24;animation:s10 1.5s linear infinite;stroke-width:4.5}
</style></head><body>
<script>
var D=[
  {n:1,name:'经典虚线流',css:'s1',d:'匀速等距虚线，通用百搭，低调可靠'},
  {n:2,name:'快速粒子',css:'s2',d:'稀疏高速粒子，适合弱电/信号线路'},
  {n:3,name:'能量块 ★',css:'s3',d:'粗实线块流动，视觉冲击力强，推荐干线'},
  {n:4,name:'脉冲波',css:'s4',d:'缓慢呼吸脉动，适合低频慢速场景'},
  {n:5,name:'霓虹光点',css:'s5',d:'细线高频闪光，赛博朋克/科技感'},
  {n:6,name:'箭头轨迹',css:'s6',d:'非对称 dash 模拟箭头，方向信息明确'},
  {n:7,name:'块状流动',css:'s7',d:'大块厚重流动，适合大功率主线路'},
  {n:8,name:'呼吸脉冲',css:'s8',d:'明暗交替呼吸，优雅，适合储能 SOC'},
  {n:9,name:'竞速条纹',css:'s9',d:'单条纹快速穿梭，轻量动感'},
  {n:10,name:'重载流动',css:'s10',d:'超粗块流动，视觉沉重，关口表专属'}
]
for(var i=0;i<D.length;i++){
  var s=D[i]
  document.write('<div class="card" onclick="pick('+s.n+')"><h3>#'+s.n+' '+s.name+'<span class="dim"> .'+s.css+'</span></h3><p>'+s.d+'</p>'+
  '<svg viewBox="0 0 300 70"><rect x="20" y="10" width="50" height="28" rx="5" fill="#1a3a2a" stroke="#00e676" stroke-width="1"/><text x="45" y="30" text-anchor="middle" font-size="10" fill="#00e676">发电</text>'+
  '<rect x="230" y="32" width="50" height="28" rx="5" fill="#2a1a1a" stroke="#e94560" stroke-width="1"/><text x="255" y="52" text-anchor="middle" font-size="10" fill="#e94560">用电</text>'+
  '<line x1="70" y1="24" x2="230" y2="46" stroke="#00e676" stroke-width="3" stroke-linecap="round" class="'+s.css+'"/></svg></div>')
}
</script></body></html>
